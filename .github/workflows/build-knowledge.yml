name: Build chatbot knowledge

on:
  push:
    paths:
      - 'assets/resume/**'
      - 'data/site.md'
      - 'scripts/build-knowledge.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build knowledge artifacts
        run: python scripts/build-knowledge.py

      - name: Commit updated knowledge files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/resume.md data/knowledge.md data/knowledge.json
          git diff --staged --quiet || git commit -m "chore: regenerate chatbot knowledge artifacts"
          git push
